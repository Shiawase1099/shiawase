<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img src="./logo.svg" alt="background" class="bg" width="20%" />
      </div>

      <div class="right">
        <h1>Get in too it today</h1>
        <p class="subtitle">
          There is no charge or obligation upon registration.
        </p>

        <div class="socials">
          <button class="fb">
            <img src="./facebook.svg" alt="background" width="20px" />
            Register with Facebook
          </button>
          <button class="in">
            <img src="./linkedin.svg" alt="background" width="20px" />
            Register with Linked In
          </button>
        </div>

        <div class="divider">
          <div class="line"></div>
          <span>OR</span>
          <div class="line"></div>
        </div>

        <form>
          <div class="inputs">
            <label for="email">Email</label>
            <input type="email" placeholder="" />
            <label for="text">Phone</label>
            <input type="text" placeholder="" />
          </div>

          <h3>What type of investor are you?</h3>
          <p class="hint">Select the type of investor you are below.</p>

          <div class="radio-group">
            <label
              ><input type="radio" name="type" checked /> Individual ⓘ</label
            >
            <label><input type="radio" name="type" /> Business ⓘ</label>
            <label><input type="radio" name="type" /> IRA ⓘ</label>
            <label><input type="radio" name="type" /> Trust ⓘ</label>
          </div>

          <div class="info-box">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </div>

          <label class="checkbox">
            <input type="checkbox" />
            I agree to the terms and receiving notification from iintoo
            <a href="">View full Terms</a>
          </label>

          <button class="submit">Create Account</button>
        </form>
      </div>
    </div>
  </body>
</html>
