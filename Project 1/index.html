<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img src="./bg.jpg" alt="background" class="bg" />
        <div class="logo">in too</div>
      </div>

      <div class="right">
        <h1>Get in too it today</h1>
        <p class="subtitle">
          There is no charge or obligation upon registration.
        </p>

        <div class="socials">
          <button class="fb">Register with Facebook</button>
          <img src="./facebook.svg" alt="background" class="fb" />
          <button class="in">Register with Linked In</button>
          <img src="./linkedin.svg" alt="background" class="in" />
        </div>

        <div class="divider">OR</div>

        <form>
          <div class="inputs">
            <input type="email" placeholder="Email" />
            <input type="text" placeholder="Phone" />
          </div>

          <h3>What type of investor are you?</h3>
          <p class="hint">Select the type of investor you are below.</p>

          <div class="radio-group">
            <label><input type="radio" name="type" checked /> Individual</label>
            <label><input type="radio" name="type" /> Business</label>
            <label><input type="radio" name="type" /> IRA</label>
            <label><input type="radio" name="type" /> Trust</label>
          </div>

          <div class="info-box">
            I am a natural person investing on my own behalf as a sole owner,
            joint tenant, or tenant in common.
          </div>

          <label class="checkbox">
            <input type="checkbox" />
            I agree to the terms and receiving notifications
          </label>

          <button class="submit">Create Account</button>
        </form>
      </div>
    </div>
  </body>
</html>
